services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    container_name: jellyfin
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    volumes:
      - ${HOMELAB_DATA_DIR}/jellyfin:/config
      - ${HOMELAB_DATA_DIR}/jellyfin/cache:/cache
      - ${MEDIA_DIR}/library:/media:ro
      - ${MEDIA_DIR}/downloads/complete:/downloads:ro
    expose:
      - "8096"
    networks:
      - proxy

networks:
  proxy:
    name: homelab_proxy
    external: true
