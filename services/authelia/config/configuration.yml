theme: auto

server:
  address: tcp://0.0.0.0:9091

log:
  level: info

totp:
  issuer: '{{ env "DOMAIN" }}'

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain: 'auth.{{ env "DOMAIN" }}'
      policy: bypass
    - domain: '{{ env "DOMAIN" }}'
      policy: one_factor

session:
  cookies:
    - domain: '{{ env "DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "DOMAIN" }}'
      default_redirection_url: 'https://{{ env "DOMAIN" }}'

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

storage:
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notification.txt
